// android/app/build.gradle (GROOVY)

plugins {
    id 'com.android.application'
    id 'kotlin-android'
    // O plugin do Flutter deve vir depois dos plugins Android e Kotlin
    id 'dev.flutter.flutter-gradle-plugin'
}

// Carrega key.properties em android/key.properties
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (!keystorePropertiesFile.exists()) {
    throw new GradleException("key.properties não encontrado em: ${keystorePropertiesFile.path}")
}
keystoreProperties.load(new FileInputStream(keystorePropertiesFile))

android {
    namespace "br.com.arid.ponto.app_arid_escolas"
    compileSdkVersion flutter.compileSdkVersion
    // Se você realmente precisa de NDK, mantenha. Caso contrário, remova.
    // ndkVersion "29.0.13113456"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11.toString()
    }

    defaultConfig {
        applicationId "br.com.arid.ponto.app_arid_escolas"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
        // Se precisar de multidex:
        // multiDexEnabled true
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
        debug {
            // padrão
        }
    }
}

flutter {
    source '../..'
}

// (Opcional) Dependência de multidex se ativar acima
// dependencies {
//     implementation 'androidx.multidex:multidex:2.0.1'
// }